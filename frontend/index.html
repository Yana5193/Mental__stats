<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Аналитика — mental_stats</title>
  <link rel="stylesheet" href="static/css/style.css">
</head>
<body>
  <div class="container wide">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:1.5rem">
      <h1>Панель аналитики <span id="roleLabel" style="font-size:1rem;color:#718096"></span></h1>
      <a href="login_staff.html" class="btn-secondary">Выйти</a>
    </div>

    <div class="stats-grid" id="statsGrid">
      <div class="stat-card"><div class="stat-number" id="totalCount">—</div><div class="stat-label">Всего записей</div></div>
      <div class="stat-card"><div class="stat-number norm" id="normCount">—</div><div class="stat-label">Норма</div></div>
      <div class="stat-card"><div class="stat-number risk" id="riskCount">—</div><div class="stat-label">В зоне риска</div></div>
      <div class="stat-card"><div class="stat-number critical" id="criticalCount">—</div><div class="stat-label">Нужна беседа <span class="notification-badge" id="critBadge" style="display:none"></span></div></div>
    </div>

    <div class="card">
      <h2>Результаты сотрудников</h2>
      <div id="tableWrap" style="overflow-x:auto">
        <table id="resultsTable">
          <thead>
            <tr>
              <th>#</th>
              <th>ID сотрудника</th>
              <th>Баллы</th>
              <th>Дата</th>
              <th>Статус</th>
            </tr>
          </thead>
          <tbody id="tableBody"></tbody>
        </table>
      </div>
      <p id="emptyMsg" class="hidden" style="text-align:center;color:#718096;padding:1rem">Данных пока нет</p>
    </div>

  </div>

  <script src="static/js/api.js"></script>
  <script src="static/js/main.js"></script>
  <script>
    requireStaff();

    const role = getStaffRole();
    document.getElementById("roleLabel").textContent = role === "psychologist" ? "(Психолог)" : "(Менеджер)";

    async function load() {
      const rows = await Api.getAnalytics();

      document.getElementById("totalCount").textContent = rows.length;
      const norm     = rows.filter(r => r.status === "Норма").length;
      const risk     = rows.filter(r => r.status === "В зоне риска").length;
      const critical = rows.filter(r => r.status === "Нужна беседа").length;

      document.getElementById("normCount").textContent = norm;
      document.getElementById("riskCount").textContent = risk;
      document.getElementById("criticalCount").textContent = critical;

      if (critical > 0) {
        const badge = document.getElementById("critBadge");
        badge.textContent = critical;
        badge.style.display = "inline-block";
      }

      const tbody = document.getElementById("tableBody");
      if (rows.length === 0) {
        document.getElementById("emptyMsg").classList.remove("hidden");
        return;
      }

      rows.forEach((r, i) => {
        const cls = r.status === "Норма" ? "norm-row"
                  : r.status === "В зоне риска" ? "risk-row" : "critical-row";
        const date = new Date(r.date_passed).toLocaleDateString("ru-RU");

        // Менеджер видит только ФИО-заменитель, баллы и дату (без статуса)
        const statusCell = role === "manager"
          ? `<td>—</td>`
          : `<td>${r.status}</td>`;

        tbody.innerHTML += `
          <tr class="${cls}">
            <td>${i + 1}</td>
            <td>${r.emp_id}</td>
            <td>${r.total_points}</td>
            <td>${date}</td>
            ${statusCell}
          </tr>`;
      });
    }

    load().catch(e => console.error(e));
  </script>
</body>
</html>
