<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Тест — mental_stats</title>
  <link rel="stylesheet" href="static/css/style.css">
</head>
<body>
  <div class="container">
    <img src="static/img/logo.png" alt="logo" class="logo" onerror="this.style.display='none'">
    <h1>Психологический тест</h1>
    <p class="subtitle" id="greeting"></p>

    <div id="loadingBlock" class="card center">Загружаем вопросы…</div>

    <div id="testBlock" class="card" style="display:none">
      <div class="progress-bar-wrap">
        <div class="progress-bar" id="progressBar" style="width:0%"></div>
      </div>
      <p id="questionCounter" style="font-size:.8rem;color:#718096;margin-bottom:.5rem"></p>
      <p class="question-text" id="questionText"></p>
      <div class="answers" id="answersBlock"></div>
    </div>

    <div id="resultBlock" class="card center" style="display:none">
      <h2>Результат</h2>
      <p style="font-size:2.5rem;font-weight:700" id="resultScore"></p>
      <p style="margin:.75rem 0" id="resultStatus"></p>
      <p style="color:#718096" id="resultAdvice"></p>
      <a href="login.html" class="btn-secondary" style="margin-top:1.5rem;display:block">Выйти</a>
    </div>

    <div id="errorBlock" class="card center error" style="display:none"></div>
  </div>

  <script src="static/js/api.js"></script>
  <script src="static/js/main.js"></script>
  <script>
    requireAuth();

    const empId = getEmpId();
    document.getElementById("greeting").textContent = `Здравствуйте, ${getFullName()}`;

    const LABELS = ["Совсем нет", "Редко", "Иногда", "Часто", "Постоянно"];

    let questions = [];
    let answers = [];
    let current = 0;

    async function init() {
      try {
        const data = await Api.getQuestions(1);
        questions = data.questions;
        document.getElementById("loadingBlock").style.display = "none";
        document.getElementById("testBlock").style.display = "block";
        showQuestion();
      } catch (e) {
        document.getElementById("loadingBlock").style.display = "none";
        const err = document.getElementById("errorBlock");
        err.textContent = e.message;
        err.style.display = "block";
      }
    }

    function showQuestion() {
      const pct = Math.round((current / questions.length) * 100);
      document.getElementById("progressBar").style.width = pct + "%";
      document.getElementById("questionCounter").textContent =
        `Вопрос ${current + 1} из ${questions.length}`;
      document.getElementById("questionText").textContent = questions[current];

      const block = document.getElementById("answersBlock");
      block.innerHTML = "";
      LABELS.forEach((label, idx) => {
        const btn = document.createElement("button");
        btn.className = "answer-btn";
        btn.textContent = `${idx + 1} — ${label}`;
        btn.onclick = () => choose(idx + 1);
        block.appendChild(btn);
      });
    }

    async function choose(value) {
      answers.push(value);
      current++;
      if (current < questions.length) {
        showQuestion();
      } else {
        document.getElementById("testBlock").style.display = "none";
        try {
          const result = await Api.submitAnswers(empId, answers);
          document.getElementById("resultScore").textContent = result.total_points + " баллов";
          document.getElementById("resultStatus").textContent = result.status;
          document.getElementById("resultAdvice").textContent = result.advice;
          document.getElementById("resultBlock").style.display = "block";
        } catch (e) {
          const err = document.getElementById("errorBlock");
          err.innerHTML = `
            <p style="margin-bottom:1rem">${e.message}</p>
            <button class="btn" onclick="restartTest()">← Пройти тест заново</button>
          `;
          err.style.display = "block";
        }
      }
    }

    function restartTest() {
      answers = [];
      current = 0;
      document.getElementById("errorBlock").style.display = "none";
      document.getElementById("testBlock").style.display = "block";
      showQuestion();
    }

    init();
  </script>
</body>
</html>
